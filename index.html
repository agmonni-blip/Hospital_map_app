<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>מפת בית החולים</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

  <style>
    body { margin: 0; font-family: Arial, sans-serif; direction: rtl; }

    #notice {
      padding: 10px;
      background: #fff3cd;
      text-align: center;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
    }

    #map { height: calc(100vh - 45px); width: 100vw; }

    #controls {
      position: absolute;
      top: 60px;
      left: 10px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
    }

    #searchBox {
      width: 180px;
      padding: 7px;
      margin: 5px;
      font-size: 15px;
    }

    button { padding: 7px; font-size: 15px; cursor: pointer; }

    #gpsStatus {
      margin-top: 8px;
      font-size: 13px;
      max-width: 270px;
      line-height: 1.4;
    }

    .personIcon {
      font-size: 30px;
      text-align: center;
      line-height: 30px;
    }

    .calibrationIcon {
      color: red;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
    }

    .nodeIcon {
      background: #007bff;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      text-align: center;
      line-height: 24px;
      font-weight: bold;
      border: 2px solid white;
    }

    #nodeOutput {
      display: none;
      width: 260px;
      height: 120px;
      margin-top: 8px;
      font-size: 12px;
      direction: ltr;
    }

  </style>
</head>

<body>

<div id="notice">
  שימו לב: מיקום GPS מדויק בעיקר בשטח פתוח, ולא בתוך בניינים.
</div>

<div id="controls">
  <button onclick="findMe()">מצא אותי</button>

  <input
    type="text"
    id="searchBox"
    placeholder="חפש מחלקה או מספר..."
    onkeydown="if (event.key === 'Enter') searchPlace();"
  >

  <button onclick="searchPlace()">חפש</button>
  <button onclick="toggleCalibrationPoints()">נקודות כיול</button>
  <button onclick="toggleNodeEditor()">מצב צמתים</button>
  <button onclick="exportNodes()">ייצא צמתים</button>
  <button onclick="togglePaths()">הצג שבילים</button>
  <button id="pathSnapButton" onclick="togglePathSnapping()">הצמדה פעילה</button>
  <textarea id="nodeOutput" readonly></textarea>

  <div id="gpsStatus"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -2
  });

  const imageWidth = 1098;
  const imageHeight = 791;
  const bounds = [[0, 0], [imageHeight, imageWidth]];

  L.imageOverlay('map.jpg', bounds).addTo(map);
  map.fitBounds(bounds);

  const places = [
    { name: "מודיעין", number: 1, x: 548, y: 570 },
    { name: "הנהלת בית החולים ומרפאות חוץ", number: 2, x: 521, y: 572 },
    { name: "מיון ומחלקת דובנוב", number: 3, x: 586, y: 577 },
    { name: "מגורי סגל", number: 4, x: 625, y: 531 },
    { name: "אולם כנות וירדן", number: 5, x: 485, y: 483 },
    { name: "ריפוי בעיסוק", number: 6, x: 612, y: 449 },
    { name: "מעבדות ובית מרקחת", number: 7, x: 642, y: 412 },
    { name: "בית כנסת", number: 8, x: 589, y: 412 },
    { name: "קפיטריה", number: 9, x: 539, y: 409 },
    { name: "מטבח וחדר אוכל", number: 10, x: 422, y: 408 },
    { name: "לוגיסטיקה, מטבח, מכבסה ומחלקת אחזקה", number: 11, x: 324, y: 410 },
    { name: "מנהל הסיעוד, השירות הסוציאלי והפסיכולוגי", number: 12, x: 474, y: 379 },
    { name: "מחלקות תמר ודקל", number: 13, x: 372, y: 552 },
    { name: "יחידת גבים ושקמה", number: 14, x: 278, y: 553 },
    { name: "מחלקות ארז וברוש", number: 15, x: 328, y: 304 },
    { name: "מחלקות גפן ותאנה", number: 16, x: 439, y: 304 },
    { name: "מחלקות ארז ושיטה", number: 17, x: 557, y: 304 },
    { name: "בתהליך בנייה", number: 18, x: 632, y: 276 },
    { name: "ספריה רפואית, אולם", number: 19, x: 738, y: 239 },
    { name: "מחלקות הדס ושקד", number: 20, x: 730, y: 413 },
    { name: "הוסטל בית רותם והמכון להתפתחות הילד", number: 21, x: 781, y: 531 },
    { name: "בית ספר גשר", number: 22, x: 200, y: 657 },
    { name: "מחלקת דולב", number: 23, x: 193, y: 493 },
    { name: "מחלקת אלון", number: 24, x: 229, y: 270 },
    { name: "מחלקת אדר", number: 25, x: 508, y: 211 },
    { name: "מרפאה פסיכוגריאטרית", number: 26, x: 702, y: 325 }
  ];

  const markers = {};

  places.forEach(place => {
    const marker = L.marker([imageHeight - place.y, place.x])
      .addTo(map)
      .bindPopup(`<b>${place.number}</b><br>${place.name}`);

    markers[place.number] = marker;
    markers[place.name] = marker;
  });

  const calibrationPoints = [
    { id: 1,  name: "פינה צפון-מזרחית",              lat: 31.2744858, lon: 34.7853431, x: 810, y: 112 },
    { id: 2,  name: "פינה צפון-מערבית",              lat: 31.2741357, lon: 34.7812648, x: 92,  y: 135 },
    { id: 3,  name: "שער מערבי",                     lat: 31.2731611, lon: 34.7814680, x: 105, y: 347 },
    { id: 4,  name: "פינה דרום-מערבית",              lat: 31.2719314, lon: 34.7818059, x: 85,  y: 608 },
    { id: 5,  name: "כניסה לחדר האוכל - בניין 10",   lat: 31.2731419, lon: 34.7834273, x: 408, y: 405 },
    { id: 6,  name: "כניסה לקפיטריה - בניין 9",      lat: 31.2734597, lon: 34.7837793, x: 466, y: 342 },
    { id: 7,  name: "כניסה למודיעין - בניין 1",      lat: 31.2726946, lon: 34.7840194, x: 542, y: 535 },
    { id: 8,  name: "כניסה לריפוי בעיסוק - בניין 6", lat: 31.2732023, lon: 34.7840724, x: 523, y: 410 },
    { id: 9,  name: "פינה דרום-מזרחית",              lat: 31.2723031, lon: 34.7855570, x: 822, y: 610 },
    { id: 10, name: "כניסה לספרייה - בניין 19",      lat: 31.2740861, lon: 34.7848951, x: 754, y: 235 }
  ];

  const startPoints = {
    library: {
      name: "כניסה לספרייה - בניין 19",
      lat: 31.2740861,
      lon: 34.7848951,
      x: 754,
      y: 235
    }
  };

  let calibrationMarkers = [];
  let userMarker = null;
  let accuracyCircle = null;

  let watchId = null;
  let gpsSamples = [];

  let activeAnchor = null;
  let anchorGpsReference = null;
  let anchorCalibrationSamples = [];

  const MAX_SAMPLES = 8;
  const MIN_SAMPLES_TO_DISPLAY = 4;
  const MAX_ACCEPTED_ACCURACY = 35;
  const MIN_ANCHOR_SAMPLES = 4;

  function setGpsStatus(text) {
    document.getElementById("gpsStatus").innerHTML = text;
  }

  function imagePointToMapLatLng(x, y) {
    return [imageHeight - y, x];
  }

  function placeUserAtImagePoint(x, y, popupText) {
    const mapLatLng = imagePointToMapLatLng(x, y);

    const personIcon = L.divIcon({
      html: "👤",
      className: "personIcon",
      iconSize: [30, 30],
      iconAnchor: [15, 15]
    });

    if (!userMarker) {
      userMarker = L.marker(mapLatLng, { icon: personIcon }).addTo(map);
    } else {
      userMarker.setLatLng(mapLatLng);
    }

    userMarker.bindPopup(popupText).openPopup();
    map.setView(mapLatLng, 1);
  }

  function initializeStartPointFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const start = params.get("start");

    if (!start || !startPoints[start]) {
      return;
    }

    activeAnchor = startPoints[start];
    anchorGpsReference = null;
    anchorCalibrationSamples = [];

    placeUserAtImagePoint(
      activeAnchor.x,
      activeAnchor.y,
      "אתה כאן<br>מיקום נקבע באמצעות QR<br>" + activeAnchor.name
    );

    setGpsStatus(
      "המיקום נקבע באמצעות QR:<br>" +
      activeAnchor.name + "<br>" +
      "נא להמתין כמה שניות לכיול GPS ביחס לעוגן."
    );

    startGpsTracking();
  }

  function searchPlace() {
    const search = document.getElementById("searchBox").value.trim();
    if (!search) return;

    let foundPlace = null;

    places.forEach(place => {
      if (place.name.includes(search) || String(place.number) === search) {
        foundPlace = place;
      }
    });

    if (!foundPlace) {
      alert("לא נמצא מקום מתאים");
      return;
    }

    const lat = imageHeight - foundPlace.y;
    const lng = foundPlace.x;

    map.setView([lat, lng], 1);
    markers[foundPlace.name].openPopup();
  }

  function isInsideHospital(lat, lon) {
    const lats = calibrationPoints.map(p => p.lat);
    const lons = calibrationPoints.map(p => p.lon);

    const north = Math.max(...lats) + 0.00025;
    const south = Math.min(...lats) - 0.00025;
    const east  = Math.max(...lons) + 0.00025;
    const west  = Math.min(...lons) - 0.00025;

    return lat <= north && lat >= south && lon <= east && lon >= west;
  }

  function solve3x3(A, b) {
    const m = [
      [A[0][0], A[0][1], A[0][2], b[0]],
      [A[1][0], A[1][1], A[1][2], b[1]],
      [A[2][0], A[2][1], A[2][2], b[2]]
    ];

    for (let i = 0; i < 3; i++) {
      let maxRow = i;
      for (let k = i + 1; k < 3; k++) {
        if (Math.abs(m[k][i]) > Math.abs(m[maxRow][i])) {
          maxRow = k;
        }
      }

      [m[i], m[maxRow]] = [m[maxRow], m[i]];

      const pivot = m[i][i];
      if (Math.abs(pivot) < 1e-12) {
        return [0, 0, 0];
      }

      for (let j = i; j < 4; j++) {
        m[i][j] /= pivot;
      }

      for (let k = 0; k < 3; k++) {
        if (k === i) continue;
        const factor = m[k][i];
        for (let j = i; j < 4; j++) {
          m[k][j] -= factor * m[i][j];
        }
      }
    }

    return [m[0][3], m[1][3], m[2][3]];
  }

  function fitAffine(targetKey) {
    let A = [
      [0, 0, 0],
      [0, 0, 0],
      [0, 0, 0]
    ];

    let b = [0, 0, 0];

    calibrationPoints.forEach(p => {
      const row = [p.lat, p.lon, 1];
      const target = p[targetKey];

      for (let i = 0; i < 3; i++) {
        b[i] += row[i] * target;
        for (let j = 0; j < 3; j++) {
          A[i][j] += row[i] * row[j];
        }
      }
    });

    return solve3x3(A, b);
  }

  const affineX = fitAffine("x");
  const affineY = fitAffine("y");

  function affinePredict(lat, lon) {
    return {
      x: affineX[0] * lat + affineX[1] * lon + affineX[2],
      y: affineY[0] * lat + affineY[1] * lon + affineY[2]
    };
  }

  function gpsDistanceMeters(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = deg => deg * Math.PI / 180;

    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);

    const a =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(toRad(lat1)) *
      Math.cos(toRad(lat2)) *
      Math.sin(dLon / 2) *
      Math.sin(dLon / 2);

    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function gpsToImageRaw(lat, lon) {
    const base = affinePredict(lat, lon);

    let weightedDx = 0;
    let weightedDy = 0;
    let totalWeight = 0;

    for (const p of calibrationPoints) {
      const predicted = affinePredict(p.lat, p.lon);

      const residualX = p.x - predicted.x;
      const residualY = p.y - predicted.y;

      const d = gpsDistanceMeters(lat, lon, p.lat, p.lon);

      if (d < 1) {
        return { x: p.x, y: p.y };
      }

      const weight = 1 / Math.pow(d + 1, 2);

      weightedDx += residualX * weight;
      weightedDy += residualY * weight;
      totalWeight += weight;
    }

    return {
      x: base.x + weightedDx / totalWeight,
      y: base.y + weightedDy / totalWeight
    };
  }

  function gpsToImage(lat, lon) {
    const rawCurrent = gpsToImageRaw(lat, lon);

    if (!activeAnchor || !anchorGpsReference) {
      return rawCurrent;
    }

    const rawAnchorReference = gpsToImageRaw(
      anchorGpsReference.lat,
      anchorGpsReference.lon
    );

    return {
      x: activeAnchor.x + (rawCurrent.x - rawAnchorReference.x),
      y: activeAnchor.y + (rawCurrent.y - rawAnchorReference.y)
    };
  }

  function getWeightedAveragePosition(samples) {
    let totalWeight = 0;
    let latSum = 0;
    let lonSum = 0;
    let accuracySum = 0;

    samples.forEach(sample => {
      const weight = 1 / Math.max(sample.accuracy, 1);

      latSum += sample.lat * weight;
      lonSum += sample.lon * weight;
      accuracySum += sample.accuracy * weight;
      totalWeight += weight;
    });

    return {
      lat: latSum / totalWeight,
      lon: lonSum / totalWeight,
      accuracy: Math.round(accuracySum / totalWeight)
    };
  }

  function updateUserMarker(positionData) {
    const rawPoint = gpsToImage(positionData.lat, positionData.lon);

    const snapResult =
      (typeof snapToNearestPath === "function")
        ? snapToNearestPath(rawPoint)
        : {
            point: rawPoint,
            snapped: false,
            distance: null,
            statusText: "הצמדה לשבילים עדיין לא נטענה."
          };

    const displayPoint = snapResult.point;
    const mapLatLng = imagePointToMapLatLng(displayPoint.x, displayPoint.y);

    const personIcon = L.divIcon({
      html: "👤",
      className: "personIcon",
      iconSize: [30, 30],
      iconAnchor: [15, 15]
    });

    if (!userMarker) {
      userMarker = L.marker(mapLatLng, { icon: personIcon }).addTo(map);
    } else {
      userMarker.setLatLng(mapLatLng);
    }

    const snapPopupText = snapResult.snapped
      ? "הצמדה לשביל: פעילה<br>" +
        "סטייה שתוקנה: " + Math.round(snapResult.distance) + " פיקסלים<br>"
      : "הצמדה לשביל: לא בוצעה<br>";

    userMarker
      .bindPopup(
        "אתה כאן<br>" +
        snapPopupText +
        "דיוק GPS משוער: " + positionData.accuracy + " מטר<br>" +
        "Lat: " + positionData.lat.toFixed(7) + "<br>" +
        "Lon: " + positionData.lon.toFixed(7)
      )
      .openPopup();

    if (accuracyCircle) {
      map.removeLayer(accuracyCircle);
    }

    accuracyCircle = L.circleMarker(mapLatLng, {
      radius: Math.min(Math.max(positionData.accuracy, 10), 45),
      opacity: 0.35,
      fillOpacity: 0.12
    }).addTo(map);

    map.setView(mapLatLng, 1);
    return snapResult;
  }

  function handleGpsPosition(position) {
    const sample = {
      lat: position.coords.latitude,
      lon: position.coords.longitude,
      accuracy: Math.round(position.coords.accuracy),
      time: Date.now()
    };

    if (sample.accuracy > MAX_ACCEPTED_ACCURACY) {
      setGpsStatus(
        "מאתר מיקום...<br>" +
        "הדיוק כרגע נמוך מדי: " + sample.accuracy + " מטר<br>" +
        "נסה לעמוד בשטח פתוח ולהמתין כמה שניות."
      );
      return;
    }

    if (!isInsideHospital(sample.lat, sample.lon)) {
      setGpsStatus("המיקום נראה מחוץ לשטח בית החולים. ממתין למדידה טובה יותר...");
      return;
    }

    if (activeAnchor && !anchorGpsReference) {
      anchorCalibrationSamples.push(sample);

      if (anchorCalibrationSamples.length > MAX_SAMPLES) {
        anchorCalibrationSamples.shift();
      }

      setGpsStatus(
        "מכייל מיקום ביחס לעוגן QR:<br>" +
        activeAnchor.name + "<br>" +
        "נאספו " + anchorCalibrationSamples.length + " מתוך " + MIN_ANCHOR_SAMPLES + " מדידות."
      );

      if (anchorCalibrationSamples.length < MIN_ANCHOR_SAMPLES) {
        return;
      }

      anchorGpsReference = getWeightedAveragePosition(anchorCalibrationSamples);

      setGpsStatus(
        "עוגן QR כויל בהצלחה:<br>" +
        activeAnchor.name + "<br>" +
        "כעת המיקום יחושב ביחס לעוגן."
      );

      return;
    }

    gpsSamples.push(sample);

    if (gpsSamples.length > MAX_SAMPLES) {
      gpsSamples.shift();
    }

    setGpsStatus(
      "מאתר מיקום...<br>" +
      "נאספו " + gpsSamples.length + " מתוך " + MIN_SAMPLES_TO_DISPLAY + " מדידות טובות.<br>" +
      "דיוק אחרון: " + sample.accuracy + " מטר"
    );

    if (gpsSamples.length < MIN_SAMPLES_TO_DISPLAY) {
      return;
    }

    const stablePosition = getWeightedAveragePosition(gpsSamples);

    const snapResult = updateUserMarker(stablePosition);

    setGpsStatus(
      "המיקום עודכן.<br>" +
      "דיוק משוקלל משוער: " + stablePosition.accuracy + " מטר<br>" +
      (activeAnchor ? "המיקום מחושב ביחס לעוגן QR.<br>" : "המיקום מחושב לפי GPS.<br>") +
      (snapResult && snapResult.statusText ? snapResult.statusText : "")
    );
  }

  function handleGpsError(error) {
    let message = "לא הצלחתי לקבל מיקום.";

    if (error.code === error.PERMISSION_DENIED) {
      message = "לא אישרת הרשאת GPS.";
    } else if (error.code === error.POSITION_UNAVAILABLE) {
      message = "המיקום לא זמין כרגע.";
    } else if (error.code === error.TIMEOUT) {
      message = "לקח יותר מדי זמן לקבל מיקום.";
    }

    setGpsStatus(message);
    alert(message);
  }

  function startGpsTracking() {
    gpsSamples = [];

    if (watchId !== null) {
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
    }

    watchId = navigator.geolocation.watchPosition(
      handleGpsPosition,
      handleGpsError,
      {
        enableHighAccuracy: true,
        timeout: 20000,
        maximumAge: 0
      }
    );
  }

  function findMe() {
    if (!navigator.geolocation) {
      alert("הדפדפן לא תומך בזיהוי מיקום.");
      return;
    }

    setGpsStatus(
      "מאתר מיקום...<br>" +
      "נא להמתין כמה שניות בשטח פתוח.<br>" +
      "המדידה הראשונה לעיתים אינה מדויקת."
    );

    startGpsTracking();
  }

  function toggleCalibrationPoints() {
    if (calibrationMarkers.length > 0) {
      calibrationMarkers.forEach(marker => map.removeLayer(marker));
      calibrationMarkers = [];
      return;
    }

    calibrationPoints.forEach(p => {
      const icon = L.divIcon({
        html: "✖" + p.id,
        className: "calibrationIcon",
        iconSize: [35, 25],
        iconAnchor: [17, 12]
      });

      const marker = L.marker([imageHeight - p.y, p.x], { icon })
        .addTo(map)
        .bindPopup(
          "<b>נקודת כיול " + p.id + "</b><br>" +
          p.name + "<br>" +
          "Lat: " + p.lat + "<br>" +
          "Lon: " + p.lon
        );

      calibrationMarkers.push(marker);
    });
  }

  initializeStartPointFromUrl();
</script>

<script>
  /*
    עורך צמתים זמני:
    - מצב צמתים: לחיצה על המפה מוסיפה צומת.
    - ייצא צמתים: מעתיק את רשימת הצמתים כ-JavaScript.
    - הכל נמצא בתוך index.html כדי שלא נצטרך קובץ node-editor.js נפרד.
  */

  let nodeEditorEnabled = false;
  let pathNodes = [];
  let nodeMarkers = [];

  function toggleNodeEditor() {
    nodeEditorEnabled = !nodeEditorEnabled;

    if (nodeEditorEnabled) {
      setGpsStatus("מצב צמתים פעיל:<br>לחץ על המפה כדי להוסיף צומת.");
    } else {
      setGpsStatus("מצב צמתים כבוי.");
    }
  }

  map.on("click", function(e) {
    if (!nodeEditorEnabled) return;

    const x = Math.round(e.latlng.lng);
    const y = Math.round(imageHeight - e.latlng.lat);

    const defaultName = "צומת " + (pathNodes.length + 1);
    const name = prompt("שם הצומת:", defaultName);

    const node = {
      id: pathNodes.length + 1,
      name: name || defaultName,
      x: x,
      y: y

    pathNodes.push(node);

    updateNodeOutput();

    setGpsStatus(
      "נוסף צומת " + node.id + ":<br>" +
      node.name + "<br>" +
      "x: " + node.x + ", y: " + node.y

      className: "nodeIcon",
      iconSize: [24, 24],
      iconAnchor: [12, 12]

    const marker = L.marker([imageHeight - node.y, node.x], { icon })
      .addTo(map)
      .bindPopup(
        "<b>צומת " + node.id + "</b><br>" +
        node.name + "<br>" +
        "x: " + node.x + "<br>" +
        "y: " + node.y + "<br><br>" +
        "לחץ על 'ייצא צמתים' כדי להעתיק את הרשימה."
      );

    nodeMarkers.push(marker);
  }

  let pathLayerItems = [];

  let pathSnappingEnabled = true;
  const MAX_SNAP_DISTANCE_PX = 60;

  function getSavedPathNode(id) {
    return savedPathNodes.find(node => node.id === id);
  }

  function togglePathSnapping() {
    pathSnappingEnabled = !pathSnappingEnabled;

    const button = document.getElementById("pathSnapButton");
    if (button) {
      button.textContent = pathSnappingEnabled ? "הצמדה פעילה" : "הצמדה כבויה";
    }

    setGpsStatus(
      pathSnappingEnabled
        ? "הצמדה לשבילים פעילה:<br>הסמן יוצג על השביל הקרוב כאשר הוא מספיק קרוב אליו."
        : "הצמדה לשבילים כבויה:<br>הסמן יוצג לפי חישוב ה-GPS בלבד."
    );
  }

  function closestPointOnSegment(point, a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const lengthSquared = dx * dx + dy * dy;

    if (lengthSquared === 0) {
      return { x: a.x, y: a.y, t: 0 };
    }

    let t =
      ((point.x - a.x) * dx + (point.y - a.y) * dy) /
      lengthSquared;

    t = Math.max(0, Math.min(1, t));

    return {
      x: a.x + t * dx,
      y: a.y + t * dy,
      t: t
    };
  }

  function snapToNearestPath(point) {
    if (!pathSnappingEnabled) {
      return {
        point: point,
        snapped: false,
        distance: null,
        statusText: "הצמדה לשבילים כבויה."
      };
    }

    let best = null;

    pathEdges.forEach(edge => {
      const a = getSavedPathNode(edge[0]);
      const b = getSavedPathNode(edge[1]);

      if (!a || !b) return;

      const candidate = closestPointOnSegment(point, a, b);
      const distance = Math.hypot(point.x - candidate.x, point.y - candidate.y);

      if (!best || distance < best.distance) {
        best = {
          point: { x: candidate.x, y: candidate.y },
          distance: distance,
          edge: edge
        };
      }
    });

    if (!best) {
      return {
        point: point,
        snapped: false,
        distance: null,
        statusText: "לא נמצאה רשת שבילים להצמדה."
      };
    }

    if (best.distance > MAX_SNAP_DISTANCE_PX) {
      return {
        point: point,
        snapped: false,
        distance: best.distance,
        edge: best.edge,
        statusText:
          "הסמן לא הוצמד לשביל:<br>הנקודה רחוקה מדי מהשביל הקרוב ביותר."
      };
    }

    return {
      point: best.point,
      snapped: true,
      distance: best.distance,
      edge: best.edge,
      statusText:
        "הסמן הוצמד לשביל הקרוב ביותר.<br>" +
        "סטייה שתוקנה: " + Math.round(best.distance) + " פיקסלים."
    };
  }

  function togglePaths() {
    if (pathLayerItems.length > 0) {
      clearPaths();
      setGpsStatus("שכבת השבילים הוסתרה.");
      return;
    }

    drawPaths();
    setGpsStatus("שכבת השבילים מוצגת:<br>בדוק שהקווים יושבים על השבילים במפה.");
  }

  function drawPaths() {
    pathEdges.forEach(edge => {
      const a = getSavedPathNode(edge[0]);
      const b = getSavedPathNode(edge[1]);

      if (!a || !b) return;

      const line = L.polyline([
        imagePointToMapLatLng(a.x, a.y),
        imagePointToMapLatLng(b.x, b.y)
      ], {
        weight: 5,
        opacity: 0.75
      }).addTo(map);

      line.bindPopup(
        "שביל:<br>" +
        a.name + " ↔ " + b.name
      );

      pathLayerItems.push(line);
    });

    savedPathNodes.forEach(node => {
      const dot = L.circleMarker(imagePointToMapLatLng(node.x, node.y), {
        radius: 5,
        opacity: 0.9,
        fillOpacity: 0.9
      }).addTo(map);

      dot.bindPopup(
        "<b>" + node.name + "</b><br>" +
        "x: " + node.x + "<br>" +
        "y: " + node.y
      );

      pathLayerItems.push(dot);
    });
  }

  function clearPaths() {
    pathLayerItems.forEach(item => map.removeLayer(item));
    pathLayerItems = [];
  }
